services:
  postgres:
    volumes:
      - /opt/taskflow/data/pgdata:/var/lib/postgresql/data

  redis:
    volumes:
      - /opt/taskflow/data/redis:/data

  api:
    restart: always
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}

  bff:
    restart: always
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      WEB_URL: http://81.71.27.234

  web:
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BFF_URL: http://81.71.27.234:3002/api/bff

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - bff
      - api

volumes:
  pgdata:
  miniodata:
