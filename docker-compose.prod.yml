services:
  postgres:
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data

  redis:
    volumes:
      - ./data/redis:/data

  api:
    restart: always
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - default
      - deploy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.services.api.loadbalancer.server.port=3001"

  bff:
    restart: always
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - default
      - deploy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff.rule=PathPrefix(`/api/bff`)"
      - "traefik.http.services.bff.loadbalancer.server.port=3002"

  web:
    restart: always
    build:
      args:
        NEXT_PUBLIC_BFF_URL: ${NEXT_PUBLIC_BFF_URL}
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BFF_URL: ${NEXT_PUBLIC_BFF_URL}
    networks:
      - default
      - deploy-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.web-cache.headers.customresponseheaders.Cache-Control=public, max-age=31536000, immutable"
      - "traefik.http.routers.web.middlewares=web-cache"

networks:
  deploy-net:
    external: true
